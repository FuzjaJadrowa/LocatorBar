name: Build all versions

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-code:
    name: Check code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Inspect Gradle projects
        run: ./gradlew --no-daemon projects --stacktrace

      - name: Check active code
        run: ./gradlew --no-daemon :26.1-fabric:check :26.1-neoforge:check --stacktrace

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: check-code

    strategy:
      fail-fast: false
      matrix:
        target:
          - 1.21.1-fabric
          - 1.21.1-neoforge
          - 1.21.4-fabric
          - 1.21.4-neoforge
          - 1.21.11-fabric
          - 1.21.11-neoforge
          - 26.1-fabric
          - 26.1-neoforge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Switch Stonecutter target
        run: ./gradlew --no-daemon stonecutterSwitchTo${{ matrix.target }} --stacktrace

      - name: Build target
        run: ./gradlew --no-daemon :${{ matrix.target }}:build --stacktrace

      - name: Upload target jars
        uses: actions/upload-artifact@v4
        with:
          name: locatorbar-${{ matrix.target }}
          path: |
            versions/${{ matrix.target }}/build/libs/*.jar
            build/libs/**/*.jar
          if-no-files-found: warn
