name: NeoForge Build

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    name: NeoForge Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build NeoForge
        run: .\gradlew.bat clean :neoforge:remapJar --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: locatorbar-neoforge
          path: neoforge/build/libs/*-neoforge-*.jar
          if-no-files-found: error